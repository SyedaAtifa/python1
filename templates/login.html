{% extends 'base.html' %}
{% block title %}Log In{% endblock %}

{% block content %}
<h1>Log In</h1>
<form method="post">
    {{ form.hidden_tag() }}
    <label>{{ form.email.label }}</label>
    {{ form.email() }}

    <label>{{ form.password.label }}</label>
    {{ form.password() }}

    {{ form.submit() }}
</form>
{% endblock %}
