<!-- templates/index.html -->
{% extends 'base.html' %}
{% block title %}Career Advisor{% endblock %}

{% block content %}
    {% if current_user.is_authenticated %}
        <h2>Welcome back, {{ current_user.name }}!</h2>
    {% endif %}
    <h1>🚀 Career Guidance Form</h1>
    <form id="advice-form" action="/response" method="post">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" required minlength="2">

        <label for="interest">Your Interest</label>
        <select name="interest" id="interest" required>
            <option value="">Select...</option>
            {% for i in interests %}
                <option value="{{ i.name }}">{{ i.name.title() }}</option>
            {% endfor %}
        </select>

        <button type="submit">Get Advice ✨</button>
    </form>
    <div id="ajax-result" class="response-text" style="display:none;"></div>
{% endblock %}

{% block scripts %}
<script>
// basic client-side validation and AJAX submission
const form = document.getElementById('advice-form');
form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const interest = document.getElementById('interest').value;
    if (!name || !interest) {
        alert('Please provide both name and interest.');
        return;
    }
    try {
        const resp = await fetch('/api/advice', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ interest })
        });
        const data = await resp.json();
        const resultDiv = document.getElementById('ajax-result');
        resultDiv.innerText = `${name}, here's some advice:\n${data.advice}`;
        resultDiv.style.display = 'block';
    } catch (err) {
        console.error(err);
        alert('Failed to fetch advice.');
    }
});
</script>
{% endblock %}
